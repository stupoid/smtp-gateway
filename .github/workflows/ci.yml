name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go test -race -count=1 ./...

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq swaks mutt msmtp netcat-openbsd

      - name: e2e — basic delivery + dot-stuffing
        run: ./e2e/run-e2e.sh

      - name: e2e — error handling + RSET
        run: ./e2e/run-e2e-errors.sh

      - name: e2e — pipelining
        run: ./e2e/run-e2e-pipeline.sh

      - name: e2e — CLI clients (mutt, msmtp, curl, swaks)
        run: ./e2e/run-e2e-clients.sh

      - name: e2e — concurrency correctness + load
        run: ./e2e/run-e2e-concurrency.sh

      - name: e2e — STARTTLS
        run: ./e2e/run-e2e-starttls.sh

      - name: e2e — BDAT (chunking)
        run: ./e2e/run-e2e-bdat.sh

      - name: e2e — SIZE limit
        run: ./e2e/run-e2e-size-limit.sh
